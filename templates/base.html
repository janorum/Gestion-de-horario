<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestor de Horarios{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #0d6efd; --bg-color: #f4f7f9; }
        body { background-color: var(--bg-color); font-family: 'Inter', -apple-system, sans-serif; }
        .navbar { background-color: white; border-bottom: 1px solid #e3e6f0; }
        .navbar-brand { color: var(--primary-color) !important; font-weight: 800; letter-spacing: -0.5px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.1); }
        .nav-tabs { border-bottom: none; gap: 10px; }
        .nav-tabs .nav-link { 
            border: none; color: #6e707e; font-weight: 600; padding: 10px 20px; border-radius: 8px; 
            transition: all 0.2s;
        }
        .nav-tabs .nav-link:hover { background-color: #eaecf4; }
        .nav-tabs .nav-link.active { 
            background-color: var(--primary-color) !important; color: white !important; 
        }
        .table thead th { background-color: #f8f9fc; text-transform: uppercase; font-size: 0.8rem; color: #4e73df; }
        .time-input { border: 1px solid #d1d3e2; border-radius: 5px; padding: 4px; }
        .total-badge { font-weight: 700; font-size: 0.9rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-light mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'horario:horario_semanal' %}">
            <i class="bi bi-clock-history"></i> GESTOR DE HORARIOS
        </a>
    </div>
</nav>

<div class="container">
    <ul class="nav nav-tabs mb-4" id="mainTabs">
        <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.app_name == 'horario' %}active{% endif %}" 
               href="{% url 'horario:horario_semanal' %}">Horario</a>
        </li>
        <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.app_name == 'calendario' %}active{% endif %}" 
               href="{% url 'calendario:ver_calendario' %}">Calendario</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#">Opciones</a>
        </li>
    </ul>

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
